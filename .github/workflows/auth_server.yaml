name: CI for auth service
on:
  push:
    branches: [main, develop]
    paths: [src/services/auth/**]
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        options: [staging, production]
      severity:
        type: choice
        options: [CRITICAL, HIGH, MEDIUM]
        default: CRITICAL

permissions:
  contents: read
  id-token: write
  actions: write

concurrency:
  group: auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13.12'
          cache: pip
          cache-dependency-path: src/services/auth/requirements.txt

      - name: Lint
        run: |
          pip install ruff==0.15.4 mypy==1.15.0
          ruff check src/services/auth/auth_server.py --fix
          ruff format src/services/auth/auth_server.py
          ruff check src/services/auth/auth_server.py
          ruff format src/services/auth/auth_server.py --check
          mypy src/services/auth/auth_server.py --ignore-missing-imports || true

      - uses: docker/setup-qemu-action@v3
        if: contains(vars.PLATFORMS, 'arm64')

      - uses: docker/setup-buildx-action@v3

      - uses: aws-actions/configure-aws-credentials@v6
        if: vars.REGISTRY_TYPE == 'ecr'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Build and Push
        env:
          PUSH: ${{ github.ref_name == 'main' && 'true' || 'false' }}
          REGISTRY_TYPE: ${{ vars.REGISTRY_TYPE || 'dockerhub' }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          ECR_REPO: ${{ vars.ECR_REPO }}
          TRIVY_SEVERITY: ${{ github.event.inputs.severity || 'CRITICAL' }}
          PLATFORMS: ${{ vars.PLATFORMS || 'linux/amd64,linux/arm64' }}
        run: bash src/services/auth/CI.sh