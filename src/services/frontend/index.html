<!--
Contract summary (deterministic contracts):
- JWT stored in localStorage under key: "app_jwt".
- Auth endpoints:
    GET  /auth/login             -> HTML page for SSO buttons (user-facing)
    GET  /auth/login/start/{p}   -> starts provider flow (redirect 302)
    GET  /auth/callback/{p}      -> provider redirects here; server will return HTML that writes localStorage.app_jwt
    GET  /auth/me                -> JSON: { "authenticated": true, "user": { <JWT payload> } }
    GET  /auth/logout            -> HTML that clears client side state
- All other app APIs remain under /api/ and require Authorization: Bearer <token> (if protected).
- Frontend will never attempt local username/password login to auth server.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Agentic Platform</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    // central token key used by frontend and auth server
    const TOKEN_KEY = 'app_jwt';

    // Attach JWT automatically to htmx requests
    document.body.addEventListener('htmx:configRequest', (evt) => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (token) evt.detail.headers['Authorization'] = 'Bearer ' + token;
    });

    // Global response handling: on 401 clear token and redirect to SSO login page
    document.body.addEventListener('htmx:afterRequest', (evt) => {
        try {
            const status = evt.detail.xhr.status;
            if (status === 401) {
                localStorage.removeItem(TOKEN_KEY);
                window.location.href = '/auth/login';
            }
        } catch (e) { /* ignore */ }
    });

    // Programmatic fetch wrapper that injects token and returns parsed json or throws
    async function apiFetch(path, opts = {}) {
        opts.headers = opts.headers || {};
        const token = localStorage.getItem(TOKEN_KEY);
        if (token) opts.headers['Authorization'] = 'Bearer ' + token;
        if (!opts.headers['Content-Type'] && opts.body) opts.headers['Content-Type'] = 'application/json';
        const res = await fetch(path, opts);
        if (!res.ok) {
            const text = await res.text().catch(() => '');
            const err = new Error(`HTTP ${res.status}: ${text || res.statusText}`);
            err.status = res.status;
            throw err;
        }
        // No-content
        if (res.status === 204) return null;
        const ct = res.headers.get('Content-Type') || '';
        if (ct.includes('application/json')) return res.json();
        return res.text();
    }

    function redirectToSSO() {
        // deterministic path: auth server's login UI page (shows provider buttons)
        window.location.href = '/auth/login';
    }

    // Called on page load
    function checkAuth() {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) {
            showLogin();
            return;
        }
        fetch('/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(r => r.ok ? r.json() : Promise.reject())
            .then(data => {
                // /auth/me response shape: { authenticated: true, user: <jwt-payload> }
                if (!data || !data.user) throw new Error('Invalid /auth/me response');
                currentUser = data.user;
                showApp(currentUser);
            })
            .catch(() => {
                localStorage.removeItem(TOKEN_KEY);
                showLogin();
            });
    }

    // UI helpers
    function showLogin() {
        // Give user a single deterministic SSO entrypoint
        document.getElementById('login-view').classList.remove('hidden');
        document.getElementById('main-view').classList.add('hidden');
    }

    function showApp(user) {
        document.getElementById('login-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        document.getElementById('user-email').textContent = user.email || '';
        loadDashboard();
        showPage('dashboard');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page-section').forEach(el => el.classList.add('hidden'));
        const target = document.getElementById('page-' + pageId);
        if (target) target.classList.remove('hidden');
        if (pageId === 'workflows') loadWorkflows();
        if (pageId === 'approvals') loadApprovals();
    }

    async function loadDashboard() {
        try {
            const [wf, ap] = await Promise.all([
                apiFetch('/api/v1/workflows').catch(() => []),
                apiFetch('/api/v1/approvals').catch(() => [])
            ]);
            document.getElementById('stat-workflows').textContent = Array.isArray(wf) ? wf.length : '-';
            document.getElementById('stat-approvals').textContent = Array.isArray(ap) ? ap.length : '-';
            document.getElementById('stat-pending').textContent = Array.isArray(ap) ? ap.filter(x => x.status === 'pending').length : '-';
        } catch (e) { console.error('[dash] load error', e); }
    }

    async function loadWorkflows() {
        try {
            const data = await apiFetch('/api/v1/workflows');
            const tbody = document.getElementById('workflows-body');
            tbody.innerHTML = (Array.isArray(data) ? data : []).map(w => `
                <tr class="border-b">
                    <td class="p-3 font-mono text-sm">${w.id}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-xs ${getStatusColor(w.status)}">${w.status}</span></td>
                    <td class="p-3 text-sm">${new Date(w.created_at).toLocaleString()}</td>
                    <td class="p-3 text-sm">${new Date(w.updated_at).toLocaleString()}</td>
                </tr>
            `).join('');
        } catch (e) { console.error('[wf] load error', e); }
    }

    async function loadApprovals() {
        try {
            const data = await apiFetch('/api/v1/approvals');
            if (!Array.isArray(data)) throw new Error('Unexpected approvals response');
            const tbody = document.getElementById('approvals-body');
            tbody.innerHTML = data.map(a => `
                <tr class="border-b">
                    <td class="p-3 font-mono text-sm">${a.id}</td>
                    <td class="p-3 font-mono text-sm">${a.workflow_id}</td>
                    <td class="p-3 text-sm">${a.action_type}</td>
                    <td class="p-3 text-sm">$${(a.amount || 0).toFixed(2)}</td>
                    <td class="p-3"><span class="px-2 py-1 rounded text-xs ${getStatusColor(a.status)}">${a.status}</span></td>
                    <td class="p-3">
                        ${a.status === 'pending' ? `
                            <button onclick="approveAction('${a.id}', 'approve')" class="mr-2 px-3 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">Approve</button>
                            <button onclick="approveAction('${a.id}', 'reject')" class="px-3 py-1 bg-red-600 text-white rounded text-xs hover:bg-red-700">Reject</button>
                        ` : '<span class="text-gray-400">-</span>'}
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            if (err && err.status === 403) {
                document.getElementById('approvals-body').innerHTML = '<tr><td colspan="6" class="p-4 text-red-500">Admin access required</td></tr>';
            } else {
                console.error('[ap] load error', err);
                document.getElementById('approvals-body').innerHTML = '<tr><td colspan="6" class="p-4 text-red-500">Failed to load approvals</td></tr>';
            }
        }
    }

    function getStatusColor(status) {
        if (status === 'completed' || status === 'approved') return 'bg-green-100 text-green-800';
        if (status === 'pending') return 'bg-yellow-100 text-yellow-800';
        return 'bg-red-100 text-red-800';
    }

    async function approveAction(id, decision) {
        try {
            await apiFetch(`/api/v1/approvals/${id}`, {
                method: 'POST',
                body: JSON.stringify({ decision })
            });
            await loadApprovals();
        } catch (e) {
            alert('Failed: ' + (e.message || e));
        }
    }

    function logout() {
        // clear client token then navigate to centralized logout UI (auth server)
        localStorage.removeItem(TOKEN_KEY);
        // call auth logout endpoint which returns client-side clearing HTML
        window.location.href = '/auth/logout';
    }

    // wire simple event for SSO login button
    function startSSO(provider) {
        // deterministic redirect path
        window.location.href = `/auth/login/start/${provider}`;
    }

    // currentUser holds JWT payload from /auth/me user
    let currentUser = null;
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans" onload="checkAuth()">

    <div id="app-container">
        <!-- Login View - single SSO entry -->
        <div id="login-view" class="hidden max-w-md mx-auto mt-20 p-6 bg-white rounded shadow text-center">
            <h2 class="text-2xl font-bold mb-4">Sign in</h2>
            <div class="flex flex-col gap-3">
                <button onclick="startSSO('google')" class="w-full inline-flex items-center justify-center border rounded py-2 px-3 mb-0 hover:bg-gray-50 transition-colors">
                    Continue with Google
                </button>
                <button onclick="startSSO('microsoft')" class="w-full inline-flex items-center justify-center border rounded py-2 px-3 mb-0 hover:bg-gray-50 transition-colors">
                    Continue with Microsoft
                </button>
            </div>
            <p class="mt-4 text-sm text-gray-500">Use your organization account to sign in.</p>
        </div>

        <!-- Main App View -->
        <div id="main-view" class="hidden min-h-screen flex flex-col">
            <header class="bg-white border-b p-4 flex justify-between items-center">
                <nav class="flex gap-6">
                    <a href="javascript:void(0)" class="hover:text-blue-600" onclick="showPage('dashboard')">Dashboard</a>
                    <a href="javascript:void(0)" class="hover:text-blue-600" onclick="showPage('workflows')">Workflows</a>
                    <a href="javascript:void(0)" class="hover:text-blue-600" onclick="showPage('approvals')">Approvals</a>
                </nav>
                <div class="flex items-center gap-4">
                    <span id="user-email" class="text-sm"></span>
                    <button onclick="logout()" class="text-sm text-red-600 hover:underline">Logout</button>
                </div>
            </header>

            <main class="flex-1 p-8">
                <div id="page-dashboard" class="page-section">
                    <h1 class="text-3xl font-bold mb-6">Dashboard</h1>
                    <div class="grid grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded shadow">
                            <div class="text-3xl font-bold" id="stat-workflows">-</div>
                            <div class="text-gray-500">Total Workflows</div>
                        </div>
                        <div class="bg-white p-6 rounded shadow">
                            <div class="text-3xl font-bold" id="stat-approvals">-</div>
                            <div class="text-gray-500">Total Approvals</div>
                        </div>
                        <div class="bg-white p-6 rounded shadow">
                            <div class="text-3xl font-bold text-yellow-600" id="stat-pending">-</div>
                            <div class="text-gray-500">Pending Approvals</div>
                        </div>
                    </div>
                </div>

                <div id="page-workflows" class="page-section hidden">
                    <h1 class="text-3xl font-bold mb-6">Workflows</h1>
                    <div id="workflows-list" class="bg-white rounded shadow overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-100 border-b">
                                <tr>
                                    <th class="p-3">ID</th>
                                    <th class="p-3">Status</th>
                                    <th class="p-3">Created</th>
                                    <th class="p-3">Updated</th>
                                </tr>
                            </thead>
                            <tbody id="workflows-body"></tbody>
                        </table>
                    </div>
                </div>

                <div id="page-approvals" class="page-section hidden">
                    <h1 class="text-3xl font-bold mb-6">Approvals</h1>
                    <div id="approvals-list" class="bg-white rounded shadow overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-gray-100 border-b">
                                <tr>
                                    <th class="p-3">ID</th>
                                    <th class="p-3">Workflow</th>
                                    <th class="p-3">Action</th>
                                    <th class="p-3">Amount</th>
                                    <th class="p-3">Status</th>
                                    <th class="p-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="approvals-body"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
